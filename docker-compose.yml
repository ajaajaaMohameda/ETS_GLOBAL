version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ets_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: ets_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=dev
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=ets_global
      - JWT_PASSPHRASE=ets_global_2026_secret
    depends_on:
      - mongodb
    command: sh -c "php bin/console lexik:jwt:generate-keypair --skip-if-exists && php -S 0.0.0.0:8000 -t public"

  frontend:
    build:
      context: ./frontend
    container_name: ets_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    command: npm run dev

volumes:
  mongodb_data: